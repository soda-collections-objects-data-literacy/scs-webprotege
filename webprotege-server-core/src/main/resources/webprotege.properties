############### WebProtege Properties ###############

# This file documents the required and optional properties for WebProtege.
# WebProtege loads the webprotege.properties file from the classpath of the
# web application.

# To change the default values used by WebProtege, copy this file
# on to the classpath i.e. for tomcat, make sure that it resides in
# webapps/webprotege/classes.

############### REQUIRED PROPERTIES ###############

# -------- data.directory ----------- #
# The directory where WebProtege data is stored.
# Must be writable by the user under which tomcat runs.
# Example: /srv/webprotege
# REQUIRED
data.directory=${data.directory}


############### OPTIONAL PROPERTIES ###############

# -------- application.version ----------#
# The version of WebProtege.  This is usually set at build time and does not normally
# need to be altered.
# Default: Automatically generated
# Optional
application.version=${version}
        
# -------- mongodb.host ----------- #
# The host name of the mongodb server.
# Default: localhost
# Optional
#mongodb.host=localhost

# -------- mongodb.port ----------- #
# The port number of the mongodb server.
# Default: 27017
# Optional
#mongodb.port=27017

# --------
project.dormant.time=180000

# OIDC / Keycloak SSO is configured ONLY via environment variables or JVM -D options,
# not via this file. Supported environment variables (env wins over -D):
#   WEBPROTEGE_OIDC_ISSUER_URI         (required, e.g. https://auth.example.com/realms/myrealm)
#   WEBPROTEGE_OIDC_CLIENT_ID          (required, Keycloak client id)
#   WEBPROTEGE_OIDC_CLIENT_SECRET      (required for confidential clients)
#   WEBPROTEGE_OIDC_REDIRECT_URI       (optional; auto-derived from request when unset)
#   WEBPROTEGE_OIDC_SCOPES             (optional; defaults to "openid profile email")
#   WEBPROTEGE_OIDC_USERNAME_CLAIM     (optional; defaults to "preferred_username")
#   WEBPROTEGE_OIDC_HIDE_LOCAL_LOGIN   (optional; "true" hides the username/password form)
# Equivalent JVM properties: -Dwebprotege.oidc.issuer.uri=... etc.
